name: Build and Push Docker Image

on:
  # Rebuild weekly (Monday 6am UTC) to pick up latest provider CLIs
  schedule:
    - cron: "0 6 * * 1"

  # Rebuild on pushes to main that change Docker or veritas package
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "templates/**"
      - "scripts/test_docker.sh"
      - ".github/workflows/docker-publish.yml"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chicagohai/veritas

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /opt/hostedtoolcache
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli \
            google-cloud-cli microsoft-edge-stable google-chrome-stable \
            firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo docker builder prune -af
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          no-cache: true

      - name: Verify image (smoke test)
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          chmod +x scripts/test_docker.sh
          ./scripts/test_docker.sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
