# Example configuration for Veritas evaluation
#
# This file shows the structure of evaluation configurations.
# You can use this as a template for batch evaluations.

evaluation:
  # Input specification
  inputs:
    paper: "/path/to/paper.pdf"      # Optional: path to the research paper
    repo: "/path/to/repository"       # Required: path to the code repository
    plan: "/path/to/plan.md"          # Optional: pre-extracted plan file

  # Output settings
  output:
    directory: "/path/to/output"      # Where to save results (default: repo/evaluation)
    generate_pdf: true                # Generate PDF report
    generate_md: true                 # Generate Markdown report

  # Evaluation settings
  evaluations:
    - code                            # Code quality (C1-C4)
    - consistency                     # Consistency (CS1-CS5)
    - generalization                  # Generalization (GT1-GT3)
    - replication                     # Replicability (RP1-RP3)
    - instruction                     # Instruction following (TS1-TS4)

  # Provider settings
  provider: claude                    # Options: claude, codex, gemini
  timeout: 3600                       # Timeout per evaluation in seconds

# Batch evaluation example
# Uncomment to evaluate multiple projects
#
# batch:
#   projects:
